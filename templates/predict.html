<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            font-family:Segoe UI;
        }

        .card{
            margin-top:40px;
            border-radius:20px;
            box-shadow:0px 10px 25px rgba(0,0,0,.3);
        }

        h2{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .btn-primary{
            width:100%;
            height:50px;
            font-size:18px;
        }

    </style>

</head>

<body>

<div class="container">

<div class="card p-5">

<h2>Student Academic Details</h2>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Student Name</label>
<input type="text" class="form-control" name="name" required>
</div>

<div class="col-md-6 mb-3">
<label>USN</label>
<input type="text" class="form-control" name="usn" required>
</div>

<div class="col-md-6 mb-3">
<label>Department</label>
<input type="text" class="form-control" name="department" required>
</div>

<div class="col-md-6 mb-3">
<label>Semester</label>
<input type="text" class="form-control" name="semester" required>
</div>

<div class="col-md-6 mb-3">
<label>Attendance (%)</label>
<input type="number" class="form-control" name="attendance" min="0" max="100" required>
</div>

<div class="col-md-6 mb-3">
<label>CGPA</label>
<input type="number" step="0.1" class="form-control" name="cgpa" min="0" max="10" required>
</div>

<div class="col-md-6 mb-3">
<label>Internal Marks</label>
<input type="number" class="form-control" name="internal" min="0" max="100" required>
</div>

<div class="col-md-6 mb-3">
<label>Backlogs</label>
<input type="number" class="form-control" name="backlogs" min="0" required>
</div>

<div class="col-md-6 mb-3">
<label>Assignments Missed</label>
<input type="number" class="form-control" name="assignments" min="0" required>
</div>

<div class="col-md-6 mb-3">
<label>Behaviour Score (1-5)</label>
<input type="number" class="form-control" name="behavior" min="1" max="5" required>
</div>

</div>

<button class="btn btn-primary mt-4">

Predict Student Risk

</button>

</form>

</div>

</div>

</body>

</html>
